_format_version: "3.0"

services:
- name: demo
  url: http://httpbin.konghq.com
  routes:
  - name: my-route
    paths:
    - /anything
    strip_path: false
    methods:
    - GET
    - POST
    filter_chains:
    - filters:
      - name: datakit
        config:
          debug: true
          nodes:
          - name: FIRST
            type: call
            url: https://api.zippopotam.us/br/93000-000

          - name: SERVICE_ID
            type: property
            property: kong.service_id

          - name: MY_HEADERS
            type: jq
            inputs:
            - first: FIRST.body
            - service: SERVICE_ID
            jq: |
              {
                "X-Hello": "World",
                "X-Foo": "Bar",
                "X-Name": $first.country,
                "X-Kong-Service-Id": $service,
              }

          - name: MY_BODY
            type: jq
            inputs:
              first: FIRST.body
            jq: $first

          - name: exit
            type: exit
            inputs:
              body: MY_BODY
              headers: MY_HEADERS
